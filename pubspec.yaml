name: barangku_dimana
description: "Aplikasi untuk mencatat dan mencari lokasi terakhir barang Anda"
publish_to: 'none'
version: 1.2.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.2
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  image_picker: ^1.0.7
  intl: ^0.18.1
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.0
  provider: ^6.1.1
  fl_chart: ^0.66.2
  shimmer: ^3.0.0
  pdf: ^3.10.7
  csv: ^6.0.0
  printing: ^5.12.0
  share_plus: ^7.2.2
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  speech_to_text: ^7.3.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/app_icon.png"
flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
